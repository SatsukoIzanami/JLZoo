<h2 mat-dialog-title>Adopt {{ animal.name }}</h2>

<mat-dialog-content>
  <form [formGroup]="form">
    <p>Give your adopted animal a custom name (optional):</p>
    <mat-form-field appearance="outline" class="full-width">
      <mat-label>Custom Name</mat-label>
      <input matInput type="text" formControlName="customName" />
    </mat-form-field>

    <p>Please enter your phone number to finalize your adoption:</p>
    <mat-form-field appearance="outline" class="full-width">
      <mat-label>Phone Number</mat-label>
      <input matInput type="tel" formControlName="phone" placeholder="e.g. 555-555-5555" />
      @if (form.controls.phone.invalid && form.controls.phone.touched) {
        <mat-error>Phone number is required.</mat-error>
      }
    </mat-form-field>
  </form>
</mat-dialog-content>

<mat-dialog-actions align="end">
  <button mat-stroked-button type="button" mat-dialog-close>Cancel</button>
  <button mat-raised-button type="button" color="primary" (click)="save()">Adopt</button>
</mat-dialog-actions>
